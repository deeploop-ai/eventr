steps {
  splitter {
    transform {
      type = route
      config {
        routes {
          us = "metadata.region == 'us'"
          eu = "metadata.region == 'eu'"
        }
      }
    }
  }
  us-sink {
    depends_on {
      splitter { route = us }
    }
    sink {
      type = http
      config { url = "https://us-api.example.com/orders" }
    }
  }
}
