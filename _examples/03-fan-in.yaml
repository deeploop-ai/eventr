# 模式：Fan-in（多 Source 汇入同一 Transform）
# 两个 cron source 分别模拟订单流与事件流，在 merge 步骤合并处理。
apiVersion: eventr/v1
kind: Pipeline
metadata:
  name: fan-in

steps:
  orders-source:
    source:
      type: cron
      decoder: json
      config:
        schedule: "0 */2 * * * *"
        payload: '{"stream":"orders","order_id":"O-1001","amount":50}'

  events-source:
    source:
      type: cron
      decoder: json
      config:
        schedule: "0 */3 * * * *"
        payload: '{"stream":"events","event_type":"page_view","user_id":"u-9"}'

  merge:
    depends_on: [orders-source, events-source]
    transform:
      type: map
      config:
        dsl: |
          payload.processed = true
          metadata.source_stream = payload.stream

  drop-sink:
    depends_on: [merge]
    sink:
      type: drop
