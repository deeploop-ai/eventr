# 模式：HOCON 格式（Envelope 风格本地配置）
# 与 01-linear-etl 等价的线性 ETL 链。
engine {
  max_workers = 8
  max_inflight = 1000
}

steps {
  cron-source {
    source {
      type = cron
      decoder = json
      config {
        schedule = "0 */5 * * * *"
        timezone = Asia/Shanghai
        payload = "{\"price\":10,\"quantity\":5,\"sku\":\"A-001\"}"
      }
    }
  }

  enrich {
    depends_on = [cron-source]
    transform {
      type = map
      workers = 2
      config {
        dsl = "payload.total = payload.price * payload.quantity\nmetadata.enriched_at = \"eventr\""
      }
    }
  }

  filter-high {
    depends_on = [enrich]
    transform {
      type = filter
      config { dsl = "payload.total > 20" }
    }
  }

  drop-sink {
    depends_on = [filter-high]
    sink { type = drop }
  }
}
