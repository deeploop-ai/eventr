# 模式：边级 buffer / retry / DLQ / best-effort
# 主路径 sink 带重试；失败消息经 DLQ 边写入 dlq-sink；analytics 为 optional 边。
apiVersion: eventr/v1
kind: Pipeline
metadata:
  name: edge-delivery

edgeDefaults:
  buffer: { type: memory, size: 64, strategy: block }
  required: true

dlq:
  sink: dlq-sink
  include_current_payload: true

steps:
  cron-source:
    source:
      type: cron
      decoder: json
      config:
        schedule: "0 */1 * * * *"
        payload: '{"id":"evt-1","payload":"data"}'

  enrich:
    depends_on: [cron-source]
    transform:
      type: map
      config:
        dsl: |
          payload.enriched = true

  primary-out:
    depends_on:
      enrich:
        buffer: { type: memory, size: 128, strategy: block }
        delivery:
          retry: { max: 3, backoff: exponential }
          timeout: 5s
          dlq: dlq-sink
    sink:
      type: http
      encoder: json
      config:
        url: "${PRIMARY_SINK_URL}"

  analytics-out:
    depends_on:
      enrich:
        required: false
        buffer: { type: memory, size: 16, strategy: drop }
    sink:
      type: drop

  # 占位入边满足拓扑校验；失败消息由 primary-out 边的 delivery.dlq 在运行时投递至此 stage
  dlq-sink:
    depends_on:
      enrich:
        condition: "false"
    sink:
      type: drop
