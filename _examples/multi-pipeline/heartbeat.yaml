# 多 Pipeline 示例之一：心跳 tick
apiVersion: eventr/v1
kind: Pipeline
metadata:
  name: heartbeat

steps:
  tick:
    source:
      type: cron
      decoder: json
      config:
        schedule: "0 */10 * * * *"
        payload: '{"pipeline":"heartbeat","tick":true}'

  drop:
    depends_on: [tick]
    sink:
      type: drop
