# 模式：条件分支（route transform + depends_on.route）
# map 写入 metadata.region，route 按区域分流至不同 sink。
apiVersion: eventr/v1
kind: Pipeline
metadata:
  name: route-branching

edgeDefaults:
  buffer: { type: memory, size: 32, strategy: block }

steps:
  cron-source:
    source:
      type: cron
      decoder: json
      config:
        schedule: "0 */1 * * * *"
        payload: '{"order_id":"ORD-42","region":"us","amount":99.5}'

  tag-region:
    depends_on: [cron-source]
    transform:
      type: map
      config:
        dsl: |
          metadata.region = payload.region

  splitter:
    depends_on: [tag-region]
    transform:
      type: route
      config:
        routes:
          us: "metadata.region == 'us'"
          eu: "metadata.region == 'eu'"
          _default: "true"
        route_order: [us, eu, _default]

  us-sink:
    depends_on:
      splitter: { route: us }
    sink:
      type: drop

  eu-sink:
    depends_on:
      splitter: { route: eu }
    sink:
      type: drop

  default-sink:
    depends_on:
      splitter: { route: _default }
    sink:
      type: drop
