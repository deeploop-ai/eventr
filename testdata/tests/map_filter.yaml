name: map-filter
pipeline: ../pipelines/linear.yaml
cases:
  - name: high total passes filter
    input:
      - '{"price":10,"quantity":5}'
    expect:
      count: 1
      messages:
        - payload:
            total: 50

  - name: low total filtered out
    input:
      - '{"price":1,"quantity":1}'
    expect:
      count: 0
