apiVersion: eventr/v1
kind: Pipeline
metadata:
  name: order-processing

engine:
  max_workers: 16
  max_inflight: 10000

steps:
  cron-source:
    source:
      type: cron
      decoder: json
      config:
        schedule: "0 0 * * * *"
        payload: '{"price":10,"quantity":5}'

  enrich:
    depends_on: [cron-source]
    transform:
      type: map
      workers: 2
      config:
        dsl: |
          payload.total = payload.price * payload.quantity

  filter-high:
    depends_on: [enrich]
    transform:
      type: filter
      config:
        dsl: "payload.total > 20"

  drop-sink:
    depends_on: [filter-high]
    sink:
      type: drop
